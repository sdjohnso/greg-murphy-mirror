name: Update Congressional Mirror

on:
  schedule:
    # Run daily at 6 AM EST (11:00 UTC)
    - cron: '0 11 * * *'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Update type'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - full

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Run update
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: |
          UPDATE_TYPE=${{ github.event.inputs.update_type || 'daily' }}
          python scripts/update_mirror.py $UPDATE_TYPE

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update congressional data $(date +'%Y-%m-%d')"
            git push
          fi
