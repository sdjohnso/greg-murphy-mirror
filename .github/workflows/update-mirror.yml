name: Update Congressional Mirror

on:
  schedule:
    # Run daily at 6 AM EST (11:00 UTC)
    - cron: '0 11 * * *'
    # Run full update on the 1st of each month at 7 AM EST (12:00 UTC)
    - cron: '0 12 1 * *'
  workflow_dispatch:
    inputs:
      update_type:
        description: 'Update type'
        required: true
        default: 'daily'
        type: choice
        options:
          - daily
          - full

permissions:
  contents: write

jobs:
  update:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Determine update type
        id: update-type
        run: |
          if [ -n "${{ github.event.inputs.update_type }}" ]; then
            echo "type=${{ github.event.inputs.update_type }}" >> $GITHUB_OUTPUT
          elif [ "$(date +%d)" = "01" ]; then
            echo "type=full" >> $GITHUB_OUTPUT
          else
            echo "type=daily" >> $GITHUB_OUTPUT
          fi

      - name: Run update
        env:
          CONGRESS_API_KEY: ${{ secrets.CONGRESS_API_KEY }}
        run: |
          echo "Running ${{ steps.update-type.outputs.type }} update"
          python scripts/update_mirror.py ${{ steps.update-type.outputs.type }}

      - name: Commit and push changes
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add -A
          if git diff --staged --quiet; then
            echo "No changes to commit"
          else
            git commit -m "Update congressional data $(date +'%Y-%m-%d')"
            git push
          fi
